name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gate:
    name: Quality gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Run quality gate
        run: just check
